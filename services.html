<section id="quote-form" class="quote-section">
    <div class="container">
        <h2 class="section-title">Request a Quote</h2>

        <form class="quote-form">

            <div class="form-group">
                <label>Your Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="(555) 123‑4567" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label>Service Needed</label>
                <select required>
                    <option value="">Select a service…</option>
                    <option>Excavation</option>
                    <option>Trenching</option>
                    <option>Grading</option>
                    <option>Site Prep</option>
                    <option>Concrete Removal</option>
                </select>
            </div>

            <div class="form-group">
                <label>Project Details</label>
                <textarea rows="5" placeholder="Describe your project…"></textarea>
            </div>

            <button type="submit" class="cta-btn">Submit Request</button>

        </form>
    </div>
</section>
